# Example Home Assistant automations for VServer SSH Stats sensors.
# Replace entity IDs, server names, and notify targets with values from your setup.

# 1) High sustained CPU load
- alias: "[VServer] CPU usage high"
  description: "Alert when CPU usage stays above 85% for 5 minutes."
  trigger:
    - platform: numeric_state
      entity_id: sensor.vps1_cpu
      above: 85
      for: "00:05:00"
  action:
    - service: notify.notify
      data:
        title: "High CPU usage on VPS1"
        message: "CPU has been above 85% for 5 minutes. Current: {{ states('sensor.vps1_cpu') }}%."
  mode: single

# 2) Memory pressure warning
- alias: "[VServer] Memory usage high"
  description: "Alert when memory usage is high for a sustained period."
  trigger:
    - platform: numeric_state
      entity_id: sensor.vps1_mem
      above: 90
      for: "00:10:00"
  action:
    - service: notify.notify
      data:
        title: "Memory pressure on VPS1"
        message: "Memory has been above 90% for 10 minutes. Current: {{ states('sensor.vps1_mem') }}%."
  mode: single

# 3) Disk fills up
- alias: "[VServer] Disk usage warning"
  description: "Warn when root filesystem is getting full."
  trigger:
    - platform: numeric_state
      entity_id: sensor.vps1_disk
      above: 85
  action:
    - service: notify.notify
      data:
        title: "Disk usage warning on VPS1"
        message: "Root filesystem is {{ states('sensor.vps1_disk') }}% used."
  mode: single

# 4) Sensor availability / SSH connectivity issue
- alias: "[VServer] SSH sensor offline"
  description: "Notify when SSH stats go unavailable for 3 minutes."
  trigger:
    - platform: state
      entity_id:
        - sensor.vps1_cpu
        - sensor.vps1_mem
      to:
        - unavailable
        - unknown
      for: "00:03:00"
  action:
    - service: notify.notify
      data:
        title: "VPS1 offline?"
        message: "SSH sensors have been unavailable for 3 minutes. Check connectivity."
  mode: single

# 5) Recovery notification after outage
- alias: "[VServer] SSH sensor recovered"
  description: "Notify when core sensors return after an outage."
  trigger:
    - platform: state
      entity_id: sensor.vps1_cpu
      from:
        - unavailable
        - unknown
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown'] }}"
  action:
    - service: notify.notify
      data:
        title: "VPS1 recovered"
        message: "CPU sensor is back online with value {{ states('sensor.vps1_cpu') }}%."
  mode: single

# 6) No network traffic for long time (possible service outage)
- alias: "[VServer] No network traffic detected"
  description: "Alert when inbound and outbound traffic both stay near zero for 15 minutes."
  trigger:
    - platform: numeric_state
      entity_id: sensor.vps1_net_in
      below: 1024
      for: "00:15:00"
  condition:
    - condition: numeric_state
      entity_id: sensor.vps1_net_out
      below: 1024
  action:
    - service: notify.notify
      data:
        title: "Low network activity on VPS1"
        message: >-
          Both inbound and outbound traffic are near zero.
          In: {{ states('sensor.vps1_net_in') }} B/s, Out: {{ states('sensor.vps1_net_out') }} B/s.
  mode: single

# 7) Restart reminder automation based on uptime
- alias: "[VServer] Long uptime reminder"
  description: "Send a reminder when uptime exceeds 30 days."
  trigger:
    - platform: numeric_state
      entity_id: sensor.vps1_uptime
      above: 2592000
  action:
    - service: notify.notify
      data:
        title: "VPS1 uptime reminder"
        message: "Uptime is above 30 days ({{ states('sensor.vps1_uptime') }} seconds). Consider maintenance."
  mode: single

# 8) Notify about package update command result event
- alias: "[VServer] Package update result"
  description: "Forward update_packages event output to notifications."
  trigger:
    - platform: event
      event_type: vserver_ssh_stats_update_packages
  action:
    - service: notify.notify
      data:
        title: "VServer package update completed"
        message: >-
          Host: {{ trigger.event.data.name | default('unknown') }}
          Result: {{ trigger.event.data.output | default('No output') }}
  mode: queued
